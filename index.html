<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ラリー燃料計算</title>
<style>
  :root{
    --bg:#09090b; --panel:#18181b; --panel-2:#0a0a0c; --border:#27272a; --border-strong:#3f3f46;
    --text:#f4f4f5; --dim:#a1a1aa; --dimmer:#71717a; --dimmest:#52525b;
    --amber:#fbbf24; --amber-dim:#f59e0b; --amber-border:#78350f;
    --emerald:#34d399; --emerald-bg:#052e21; --emerald-border:#065f46;
    --red:#f87171; --red-bg:#2a0e0e; --red-border:#7f1d1d;
    --cyan:#22d3ee; --cyan-border:#164e63;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",Segoe UI,sans-serif;
  }
  .mono{ font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; }
  #app{ padding-bottom:70px; }
  .header{
    border-bottom:1px solid var(--border); background:rgba(24,24,27,.6);
    padding:28px 20px 20px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
  }
  .eyebrow{ display:flex; align-items:center; gap:6px; color:var(--amber); font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; margin-bottom:4px; font-weight:600; }
  .title-input{
    font-size:20px; font-weight:700; letter-spacing:-.01em; background:transparent; color:var(--text);
    border:none; border-bottom:1px solid transparent; outline:none; width:100%; padding:2px 0; font-family:inherit;
  }
  .title-input:focus{ border-bottom-color:rgba(251,191,36,.6); }
  .subtitle{ color:var(--dimmer); font-size:13px; margin:2px 0 0; }
  .btn-print{
    display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--border-strong);
    color:var(--dim); font-size:12px; font-weight:600; padding:8px 12px; border-radius:8px; cursor:pointer;
    white-space:nowrap; flex-shrink:0;
  }
  .btn-print:hover{ border-color:rgba(251,191,36,.7); color:var(--amber); }
  .content{ padding:0 20px; margin-top:20px; display:flex; flex-direction:column; gap:20px; }
  .card{ background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .card-pad{ padding:16px; }
  .card-head{ padding:16px 16px 12px; border-bottom:1px solid rgba(39,39,42,.8); display:flex; align-items:center; justify-content:space-between; }
  .card-title{ font-size:14px; font-weight:600; color:var(--dim); margin:0; }
  .card-title.strong{ color:var(--text); font-weight:700; font-size:15px; }
  .hint{ color:var(--dimmer); font-size:12px; margin:2px 0 12px; line-height:1.5; }
  .row-2{ display:flex; gap:8px; }
  .btn-secondary{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    background:var(--panel-2); border:1px solid var(--border); color:#e4e4e7; font-size:14px; font-weight:600;
    padding:11px; border-radius:10px; cursor:pointer;
  }
  .btn-secondary:hover{ border-color:rgba(251,191,36,.7); }
  .btn-secondary:disabled{ opacity:.5; cursor:default; }
  .msg-amber{ color:var(--amber); font-size:12px; margin-top:8px; }
  .msg-red{ color:var(--red); font-size:12px; margin-top:8px; }
  .link-btn{ display:flex; align-items:center; gap:4px; background:none; border:none; color:var(--dimmer); font-size:12px; cursor:pointer; padding:0; }
  .link-btn:hover{ color:var(--amber); }
  table{ width:100%; border-collapse:collapse; font-size:12px; min-width:640px; }
  thead tr{ border-bottom:1px solid var(--border); }
  th{ text-align:left; padding:8px 12px; font-size:10px; color:var(--dimmer); text-transform:uppercase; font-weight:500; font-family:inherit; }
  th.r{ text-align:right; }
  tbody tr{ border-bottom:1px solid rgba(39,39,42,.6); }
  tbody tr:hover{ background:rgba(9,9,11,.4); }
  td{ padding:6px 12px; }
  td input{
    background:transparent; border:none; border-bottom:1px solid transparent; color:#e4e4e7; outline:none;
    font-size:12px; font-family:inherit; width:100%;
  }
  td input:focus{ border-bottom-color:rgba(251,191,36,.6); }
  td input.num{ text-align:right; font-family:"SFMono-Regular",Consolas,monospace; width:64px; }
  td input.tc{ width:56px; font-family:"SFMono-Regular",Consolas,monospace; }
  td input.loc{ width:160px; }
  td input.sec{ width:96px; color:var(--dimmer); }
  .table-wrap{ overflow-x:auto; }
  .del-btn{ background:none; border:none; color:var(--dimmest); cursor:pointer; display:flex; }
  .del-btn:hover{ color:var(--red); }
  .field-label{ font-size:11px; color:var(--dimmer); text-transform:uppercase; font-family:"SFMono-Regular",Consolas,monospace; display:block; margin-bottom:3px; }
  .amber-tag{ color:var(--amber); text-transform:none; }
  .num-field{
    display:flex; align-items:center; gap:6px; background:var(--panel-2); border:1px solid var(--border);
    border-radius:8px; padding:7px 10px;
  }
  .num-field:focus-within{ border-color:rgba(251,191,36,.7); }
  .num-field input{
    width:100%; background:transparent; border:none; outline:none; color:var(--text); text-align:right;
    font-family:"SFMono-Regular",Consolas,monospace; font-size:15px;
  }
  .num-field span{ color:var(--dimmer); font-size:11px; font-family:"SFMono-Regular",Consolas,monospace; flex-shrink:0; }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 0; padding-top:12px; }
  .readonly-value{
    background:var(--panel-2); border:1px solid var(--border); border-radius:8px; padding:7px 10px;
    text-align:right; font-family:"SFMono-Regular",Consolas,monospace; font-size:15px; color:#d4d4d8;
  }
  .readonly-value span{ color:var(--dimmer); font-size:11px; }
  .refuel-card{ border-color:var(--cyan-border); }
  .refuel-eyebrow{ display:flex; align-items:center; gap:6px; color:var(--cyan); font-size:11px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:4px; font-weight:600; }
  .readout{ margin:12px 16px 16px; background:var(--panel-2); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .readout-row{ display:flex; justify-content:space-between; font-size:12px; color:var(--dimmer); font-family:"SFMono-Regular",Consolas,monospace; margin-bottom:6px; }
  .required-row{ display:flex; align-items:baseline; justify-content:space-between; }
  .required-label{ font-size:12px; color:var(--dim); }
  .required-value{ font-family:"SFMono-Regular",Consolas,monospace; font-size:24px; font-weight:700; color:#fafafa; }
  .required-value span{ font-size:13px; color:var(--dimmer); margin-left:4px; }
  .margin-box{ margin-top:12px; display:flex; align-items:center; justify-content:space-between; border-radius:8px; padding:8px 12px; border:1px solid; }
  .margin-box.ok{ background:rgba(5,46,33,.4); border-color:var(--emerald-border); color:var(--emerald); }
  .margin-box.bad{ background:rgba(42,14,14,.4); border-color:var(--red-border); color:var(--red); }
  .margin-status{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; }
  .margin-value{ font-family:"SFMono-Regular",Consolas,monospace; font-size:13px; }
  .totals-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; text-align:center; }
  .totals-cell{ background:var(--panel-2); border:1px solid var(--border); border-radius:10px; padding:10px 4px; }
  .totals-cell.hi{ border-color:var(--amber-border); }
  .totals-label{ font-size:10px; color:var(--dimmer); text-transform:uppercase; font-family:"SFMono-Regular",Consolas,monospace; }
  .totals-label.hi{ color:var(--amber-dim); }
  .totals-value{ font-family:"SFMono-Regular",Consolas,monospace; font-size:16px; font-weight:700; margin-top:2px; }
  .totals-value.hi{ color:var(--amber); }
  .totals-unit{ font-size:10px; color:var(--dimmest); }
  .foot-note{ font-size:11px; color:var(--dimmest); margin-top:12px; line-height:1.6; }
  #print-sheet{ display:none; }
  @media print{
    .no-print{ display:none !important; }
    #print-sheet{ display:block !important; }
    body{ background:#fff !important; }
  }
  #print-sheet{ padding:24px; color:#000; background:#fff; }
  #print-sheet table{ width:100%; font-size:11px; border-collapse:collapse; margin-bottom:20px; min-width:0; }
  #print-sheet th{ text-align:left; padding:4px 8px 4px 0; border-bottom:1px solid #000; color:#000; text-transform:none; font-size:11px; }
  #print-sheet th.r, #print-sheet td.r{ text-align:right; }
  #print-sheet td{ padding:4px 8px 4px 0; border-bottom:1px solid #ccc; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  // ---------- data ----------
  var initialRows = [
    { id:"r0",  tc:"0",   location:"Start(バイテック文化ホール)",                     ss:null,  li:null,  section:"-",         due:"7:30:00" },
    { id:"r1",  tc:"1",   location:"Gonda",                                            ss:null,  li:22.3,  section:"Section-1", due:"8:20" },
    { id:"r2",  tc:"SS1", location:"Sakakura",                                         ss:11.0,  li:null,  section:"Section-1", due:"8:23" },
    { id:"r3",  tc:"2",   location:"Kaise",                                            ss:null,  li:17.74, section:"Section-1", due:"9:13" },
    { id:"r4",  tc:"SS2", location:"Kazuma-Rev",                                       ss:9.3,   li:null,  section:"Section-1", due:"9:16" },
    { id:"r5",  tc:"3",   location:"Gonda",                                            ss:null,  li:27.6,  section:"Section-1", due:"10:06" },
    { id:"r6",  tc:"SS3", location:"Sakakura",                                         ss:11.0,  li:null,  section:"Section-1", due:"10:09" },
    { id:"r7",  tc:"RZ1", location:"JA-SS",                                            ss:null,  li:15.6,  section:"Section-1", due:"10:44" },
    { id:"r8",  tc:"3A",  location:"バイテック文化ホール Service IN",                  ss:null,  li:8.1,   section:"Section-1", due:"11:04" },
    { id:"r9",  tc:"3B",  location:"バイテック文化ホール Service Out/Regroup IN",      ss:null,  li:null,  section:"-",         due:"11:39" },
    { id:"r10", tc:"3C",  location:"バイテック文化ホール Regroup OUT",                 ss:null,  li:null,  section:"-",         due:"11:49" },
    { id:"r11", tc:"4",   location:"Kaise",                                            ss:null,  li:27.5,  section:"Section-2", due:"12:39" },
    { id:"r12", tc:"SS4", location:"Kazuma-Rev",                                       ss:9.3,   li:null,  section:"Section-2", due:"12:42" },
    { id:"r13", tc:"5",   location:"Gonda",                                            ss:null,  li:27.6,  section:"Section-2", due:"13:32" },
    { id:"r14", tc:"SS5", location:"Sakakura",                                         ss:11.0,  li:null,  section:"Section-2", due:"13:35" },
    { id:"r15", tc:"5A",  location:"Parc Ferme IN",                                    ss:null,  li:22.8,  section:"Section-2", due:"14:20" }
  ];

  var uid = 100;
  function newId(){ return "r" + (uid++); }

  function cloneRows(rows){ return rows.map(function(r){ return Object.assign({}, r); }); }

  var defaultState = {
    eventTitle: "あさま隠山岳ラリー 2026",
    liaisonRate: 9,
    ssRate: 1.5,
    startFuel: 45,
    refuels: {},
    sectionOverrides: {},
    importing: false,
    importError: ""
  };

  var state = Object.assign({}, defaultState, { rows: cloneRows(initialRows) });

  function resetState(){
    state = Object.assign({}, defaultState, { rows: cloneRows(initialRows) });
  }

  // ---------- computation ----------
  function computeBaseSections(rows){
    var order = [], map = {};
    rows.forEach(function(r){
      var sec = (r.section || "-").trim();
      if(!sec || sec === "-") return;
      if(!map[sec]){ map[sec] = { name:sec, liaisonKm:0, ssKm:0 }; order.push(sec); }
      map[sec].liaisonKm += Number(r.li) || 0;
      map[sec].ssKm += Number(r.ss) || 0;
    });
    return order.map(function(name){ return map[name]; });
  }

  function computeAll(){
    var base = computeBaseSections(state.rows);
    var effective = base.map(function(s){
      var ov = state.sectionOverrides[s.name] || {};
      return {
        name: s.name,
        baseLiaisonKm: s.liaisonKm,
        baseSsKm: s.ssKm,
        liaisonKm: ov.liaisonKm !== undefined ? ov.liaisonKm : s.liaisonKm,
        ssKm: ov.ssKm !== undefined ? ov.ssKm : s.ssKm,
        liaisonOverridden: ov.liaisonKm !== undefined,
        ssOverridden: ov.ssKm !== undefined
      };
    });

    var carry = state.startFuel;
    var results = effective.map(function(s, i){
      var refuel = i === 0 ? 0 : (state.refuels[s.name] || 0);
      var prevLeftover = i === 0 ? null : carry;
      var remain = carry + refuel;
      var liaisonFuel = state.liaisonRate > 0 ? s.liaisonKm / state.liaisonRate : 0;
      var ssFuel = state.ssRate > 0 ? s.ssKm / state.ssRate : 0;
      var required = liaisonFuel + ssFuel;
      var margin = remain - required;
      carry = margin;
      return Object.assign({}, s, {
        refuel: refuel, prevLeftover: prevLeftover, remain: remain,
        liaisonFuel: liaisonFuel, ssFuel: ssFuel, required: required, margin: margin, ok: margin >= 0
      });
    });

    var totals = {
      liaisonKm: effective.reduce(function(a,s){ return a + s.liaisonKm; }, 0),
      ssKm: effective.reduce(function(a,s){ return a + s.ssKm; }, 0),
      required: results.reduce(function(a,r){ return a + r.required; }, 0)
    };

    return { results: results, totals: totals };
  }

  // ---------- helpers ----------
  function esc(str){
    return String(str == null ? "" : str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function fmt(n){ return (Math.round((n + Number.EPSILON) * 100) / 100).toFixed(2); }
  function setText(id, text){ var el = document.getElementById(id); if(el) el.textContent = text; }

  function fileToBase64(file){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){ resolve(reader.result.split(",")[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- rendering ----------
  function rowHtml(r){
    return (
      '<tr>' +
        '<td><input class="tc" data-row-id="' + r.id + '" data-field="tc" value="' + esc(r.tc) + '"></td>' +
        '<td><input class="loc" data-row-id="' + r.id + '" data-field="location" value="' + esc(r.location) + '"></td>' +
        '<td><input class="num" type="number" step="0.01" placeholder="—" data-row-id="' + r.id + '" data-field="ss" value="' + (r.ss == null ? "" : r.ss) + '"></td>' +
        '<td><input class="num" type="number" step="0.01" placeholder="—" data-row-id="' + r.id + '" data-field="li" value="' + (r.li == null ? "" : r.li) + '"></td>' +
        '<td><input class="sec" data-row-id="' + r.id + '" data-field="section" value="' + esc(r.section) + '"></td>' +
        '<td><button class="del-btn" data-action="delete-row" data-row-id="' + r.id + '" title="削除">✕</button></td>' +
      '</tr>'
    );
  }

  function sectionBlockHtml(r, i, prevName){
    var refuelCard = "";
    if(i > 0){
      refuelCard =
        '<div class="card refuel-card card-pad">' +
          '<div class="refuel-eyebrow">⛽ リフューエル</div>' +
          '<p class="hint" id="sec-' + i + '-refuel-hint">' + esc(prevName) + ' 終了時点の残り ' + fmt(r.prevLeftover) + ' L に、ここで補給した分を追加します。</p>' +
          '<div class="num-field"><input type="number" step="0.1" min="0" data-section-name="' + esc(r.name) + '" data-field="refuel" value="' + r.refuel + '"><span>L</span></div>' +
          '<p class="foot-note mono" id="sec-' + i + '-refuel-eq" style="margin-top:8px;">' + fmt(r.prevLeftover) + ' L + ' + fmt(r.refuel) + ' L = ' + fmt(r.remain) + ' L（' + esc(r.name) + ' 開始時）</p>' +
        '</div>';
    }

    var startFuelBlock;
    if(i === 0){
      startFuelBlock =
        '<div style="padding:12px 16px 0;">' +
          '<label class="field-label">開始燃料（スタート時）</label>' +
          '<div class="num-field"><input type="number" step="0.1" min="0" data-field="startFuel" value="' + state.startFuel + '"><span>L</span></div>' +
        '</div>';
    } else {
      startFuelBlock =
        '<div style="padding:12px 16px 0;">' +
          '<label class="field-label">開始燃料（リフューエル後）</label>' +
          '<div class="readonly-value" id="sec-' + i + '-start-display">' + fmt(r.remain) + ' <span>L</span></div>' +
        '</div>';
    }

    var overrideResetDisplay = (r.liaisonOverridden || r.ssOverridden) ? "flex" : "none";

    return (
      refuelCard +
      '<div class="card">' +
        '<div class="card-head"><h3 class="card-title strong">' + esc(r.name) + '</h3></div>' +
        '<div class="grid-2">' +
          '<div>' +
            '<label class="field-label">リエゾン距離 <span class="amber-tag" id="sec-' + i + '-li-tag" style="display:' + (r.liaisonOverridden ? "inline" : "none") + '">(手動)</span></label>' +
            '<div class="num-field"><input type="number" step="0.01" min="0" data-section-name="' + esc(r.name) + '" data-field="liaisonOverride" value="' + fmt(r.liaisonKm) + '"><span>km</span></div>' +
          '</div>' +
          '<div>' +
            '<label class="field-label">SS距離 <span class="amber-tag" id="sec-' + i + '-ss-tag" style="display:' + (r.ssOverridden ? "inline" : "none") + '">(手動)</span></label>' +
            '<div class="num-field"><input type="number" step="0.01" min="0" data-section-name="' + esc(r.name) + '" data-field="ssOverride" value="' + fmt(r.ssKm) + '"><span>km</span></div>' +
          '</div>' +
        '</div>' +
        '<div style="padding:6px 16px 0;">' +
          '<button class="link-btn" id="sec-' + i + '-reset-btn" data-action="reset-override" data-section-name="' + esc(r.name) + '" style="display:' + overrideResetDisplay + ';">' +
            '↺ <span id="sec-' + i + '-reset-label">表からの自動計算値に戻す（リエゾン ' + fmt(r.baseLiaisonKm) + ' / SS ' + fmt(r.baseSsKm) + ' km）</span>' +
          '</button>' +
        '</div>' +
        startFuelBlock +
        '<div class="readout">' +
          '<div class="readout-row"><span id="sec-' + i + '-liaison-fuel">リエゾン ' + fmt(r.liaisonFuel) + ' L</span><span id="sec-' + i + '-ss-fuel">SS ' + fmt(r.ssFuel) + ' L</span></div>' +
          '<div class="required-row"><span class="required-label">必要燃料</span><span class="required-value" id="sec-' + i + '-required">' + fmt(r.required) + '<span>L</span></span></div>' +
          '<div class="margin-box ' + (r.ok ? "ok" : "bad") + '" id="sec-' + i + '-margin-box">' +
            '<span class="margin-status"><span id="sec-' + i + '-status-icon">' + (r.ok ? "✓" : "⚠") + '</span><span id="sec-' + i + '-status-text">' + (r.ok ? "燃料は足ります" : "燃料不足の可能性") + '</span></span>' +
            '<span class="margin-value" id="sec-' + i + '-margin-value">' + (r.margin >= 0 ? "+" : "") + fmt(r.margin) + ' L</span>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  function printSheetHtml(results, totals){
    var rowsHtml = state.rows.map(function(r){
      return '<tr><td>' + esc(r.tc) + '</td><td>' + esc(r.location) + '</td><td class="r">' + (r.ss == null ? "" : r.ss) +
        '</td><td class="r">' + (r.li == null ? "" : r.li) + '</td><td>' + esc(r.section) + '</td></tr>';
    }).join("");

    var resultsHtml = results.map(function(r, i){
      return '<tr><td>' + esc(r.name) + '</td><td class="r">' + fmt(r.liaisonKm) + '</td><td class="r">' + fmt(r.ssKm) +
        '</td><td class="r">' + (i === 0 ? "—" : fmt(r.refuel)) + '</td><td class="r">' + fmt(r.remain) +
        '</td><td class="r">' + fmt(r.required) + '</td><td class="r">' + (r.margin >= 0 ? "+" : "") + fmt(r.margin) +
        (r.ok ? "" : "（不足）") + '</td></tr>';
    }).join("");

    return (
      '<h1 style="font-size:18px;font-weight:700;margin:0 0 4px;">' + esc(state.eventTitle) + ' — 燃料計算レポート</h1>' +
      '<p style="font-size:12px;color:#555;margin:0 0 16px;">燃費設定：リエゾン ' + state.liaisonRate + ' km/L ／ SS ' + state.ssRate + ' km/L</p>' +
      '<table><thead><tr><th>TC</th><th>地点</th><th class="r">SS(km)</th><th class="r">Liaison(km)</th><th>区分</th></tr></thead><tbody>' + rowsHtml + '</tbody></table>' +
      '<table><thead><tr><th>セクション</th><th class="r">リエゾン(km)</th><th class="r">SS(km)</th><th class="r">リフューエル(L)</th><th class="r">開始燃料(L)</th><th class="r">必要燃料(L)</th><th class="r">過不足(L)</th></tr></thead><tbody>' + resultsHtml + '</tbody></table>' +
      '<p style="font-size:12px;">合計：リエゾン ' + fmt(totals.liaisonKm) + ' km ／ SS ' + fmt(totals.ssKm) + ' km ／ 総必要燃料 ' + fmt(totals.required) + ' L</p>'
    );
  }

  function render(){
    var calc = computeAll();
    var results = calc.results, totals = calc.totals;

    var sectionsHtml = results.map(function(r, i){
      return sectionBlockHtml(r, i, i > 0 ? results[i-1].name : null);
    }).join("");

    var html =
      '<div class="header no-print">' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="eyebrow">⏱ Fuel Trip Computer</div>' +
          '<input class="title-input" id="title-input" data-field="eventTitle" value="' + esc(state.eventTitle) + '">' +
          '<p class="subtitle">セクション別 必要燃料計算</p>' +
        '</div>' +
        '<button class="btn-print" data-action="print">🖨 PDF出力</button>' +
      '</div>' +

      '<div class="content no-print">' +

        '<div class="card card-pad">' +
          '<h2 class="card-title">アイテナリーを取り込む</h2>' +
          '<p class="hint">写真からTC・SS・リエゾン距離を自動で読み取り、下の表に反映します。</p>' +
          '<div class="row-2">' +
            '<button class="btn-secondary" id="camera-btn" ' + (state.importing ? "disabled" : "") + '>📷 カメラで撮影</button>' +
            '<button class="btn-secondary" id="gallery-btn" ' + (state.importing ? "disabled" : "") + '>🖼 アルバムから選択</button>' +
          '</div>' +
          '<input type="file" id="camera-input" accept="image/*" capture="environment" data-action="import-camera" style="display:none;">' +
          '<input type="file" id="gallery-input" accept="image/*" data-action="import-gallery" style="display:none;">' +
          (state.importing ? '<p class="msg-amber">画像を読み取っています…</p>' : "") +
          (state.importError ? '<p class="msg-red">' + esc(state.importError) + '</p>' : "") +
        '</div>' +

        '<div class="card">' +
          '<div class="card-head"><h2 class="card-title">アイテナリー（文字起こし表）</h2>' +
            '<button class="link-btn" data-action="add-row">＋ 行を追加</button></div>' +
          '<div class="table-wrap"><table>' +
            '<thead><tr><th>TC</th><th>地点</th><th class="r">SS(km)</th><th class="r">Liaison(km)</th><th>区分</th><th></th></tr></thead>' +
            '<tbody>' + state.rows.map(rowHtml).join("") + '</tbody>' +
          '</table></div>' +
        '</div>' +

        '<div class="card card-pad">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
            '<h2 class="card-title">燃費（km / L）</h2>' +
            '<button class="link-btn" data-action="reset">↺ リセット</button>' +
          '</div>' +
          '<div class="grid-2" style="padding:0;">' +
            '<div><label class="field-label">リエゾン</label><div class="num-field"><input type="number" step="0.1" min="0" data-field="liaisonRate" value="' + state.liaisonRate + '"><span>km/L</span></div></div>' +
            '<div><label class="field-label">SS</label><div class="num-field"><input type="number" step="0.1" min="0" data-field="ssRate" value="' + state.ssRate + '"><span>km/L</span></div></div>' +
          '</div>' +
        '</div>' +

        sectionsHtml +

        '<div class="card card-pad">' +
          '<div style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;margin-bottom:12px;">⛽ ラリー全体（参考）</div>' +
          '<div class="totals-grid">' +
            '<div class="totals-cell"><div class="totals-label">リエゾン計</div><div class="totals-value" id="totals-liaison">' + fmt(totals.liaisonKm) + '</div><div class="totals-unit">km</div></div>' +
            '<div class="totals-cell"><div class="totals-label">SS計</div><div class="totals-value" id="totals-ss">' + fmt(totals.ssKm) + '</div><div class="totals-unit">km</div></div>' +
            '<div class="totals-cell hi"><div class="totals-label hi">総必要燃料</div><div class="totals-value hi" id="totals-required">' + fmt(totals.required) + '</div><div class="totals-unit">L</div></div>' +
          '</div>' +
          '<p class="foot-note">※ Section-1の残り燃料は自動的にSection-2へ繰り越されます。セクション間で給油した場合は「リフューエル」欄にリットル数を入力すると、次セクションの開始燃料に自動加算されます。各セクションのリエゾン/SS距離は表からの自動集計が既定値ですが、直接編集して上書きすることもできます。区分（Section-1等）は表の「区分」列で自由に編集できます。</p>' +
        '</div>' +

      '</div>' +

      '<div id="print-sheet">' + printSheetHtml(results, totals) + '</div>';

    document.getElementById("app").innerHTML = html;
    document.title = state.eventTitle + " | 燃料計算";

    var cameraBtn = document.getElementById("camera-btn");
    var galleryBtn = document.getElementById("gallery-btn");
    if(cameraBtn) cameraBtn.addEventListener("click", function(){ document.getElementById("camera-input").click(); });
    if(galleryBtn) galleryBtn.addEventListener("click", function(){ document.getElementById("gallery-input").click(); });
  }

  function recompute(){
    var calc = computeAll();
    var results = calc.results, totals = calc.totals;

    results.forEach(function(r, i){
      setText("sec-" + i + "-liaison-fuel", "リエゾン " + fmt(r.liaisonFuel) + " L");
      setText("sec-" + i + "-ss-fuel", "SS " + fmt(r.ssFuel) + " L");
      setText("sec-" + i + "-required", fmt(r.required));
      setText("sec-" + i + "-margin-value", (r.margin >= 0 ? "+" : "") + fmt(r.margin) + " L");
      setText("sec-" + i + "-status-text", r.ok ? "燃料は足ります" : "燃料不足の可能性");
      setText("sec-" + i + "-status-icon", r.ok ? "✓" : "⚠");

      var box = document.getElementById("sec-" + i + "-margin-box");
      if(box) box.className = "margin-box " + (r.ok ? "ok" : "bad");

      if(i > 0){
        setText("sec-" + i + "-start-display", fmt(r.remain) + " L");
        setText("sec-" + i + "-refuel-eq", fmt(r.prevLeftover) + " L + " + fmt(r.refuel) + " L = " + fmt(r.remain) + " L（" + r.name + " 開始時）");
      }

      var liTag = document.getElementById("sec-" + i + "-li-tag");
      if(liTag) liTag.style.display = r.liaisonOverridden ? "inline" : "none";
      var ssTag = document.getElementById("sec-" + i + "-ss-tag");
      if(ssTag) ssTag.style.display = r.ssOverridden ? "inline" : "none";
      var resetBtn = document.getElementById("sec-" + i + "-reset-btn");
      if(resetBtn) resetBtn.style.display = (r.liaisonOverridden || r.ssOverridden) ? "flex" : "none";
      var resetLabel = document.getElementById("sec-" + i + "-reset-label");
      if(resetLabel) resetLabel.textContent = "表からの自動計算値に戻す（リエゾン " + fmt(r.baseLiaisonKm) + " / SS " + fmt(r.baseSsKm) + " km）";
    });

    setText("totals-liaison", fmt(totals.liaisonKm));
    setText("totals-ss", fmt(totals.ssKm));
    setText("totals-required", fmt(totals.required));

    var sheet = document.getElementById("print-sheet");
    if(sheet) sheet.innerHTML = printSheetHtml(results, totals);

    document.title = state.eventTitle + " | 燃料計算";
  }

  // ---------- state mutation from DOM ----------
  function applyFieldUpdate(target){
    var rowId = target.dataset.rowId;
    var sectionName = target.dataset.sectionName;
    var field = target.dataset.field;
    if(!field) return;

    if(rowId){
      var row = state.rows.find(function(r){ return r.id === rowId; });
      if(!row) return;
      if(field === "ss" || field === "li"){
        row[field] = target.value === "" ? null : parseFloat(target.value);
      } else {
        row[field] = target.value;
      }
      return;
    }

    if(sectionName){
      if(field === "liaisonOverride"){
        state.sectionOverrides[sectionName] = state.sectionOverrides[sectionName] || {};
        state.sectionOverrides[sectionName].liaisonKm = target.value === "" ? 0 : parseFloat(target.value);
      } else if(field === "ssOverride"){
        state.sectionOverrides[sectionName] = state.sectionOverrides[sectionName] || {};
        state.sectionOverrides[sectionName].ssKm = target.value === "" ? 0 : parseFloat(target.value);
      } else if(field === "refuel"){
        state.refuels[sectionName] = target.value === "" ? 0 : parseFloat(target.value);
      }
      return;
    }

    if(field === "liaisonRate") state.liaisonRate = target.value === "" ? 0 : parseFloat(target.value);
    else if(field === "ssRate") state.ssRate = target.value === "" ? 0 : parseFloat(target.value);
    else if(field === "startFuel") state.startFuel = target.value === "" ? 0 : parseFloat(target.value);
    else if(field === "eventTitle") state.eventTitle = target.value;
  }

  // ---------- image import via Claude vision ----------
  function handleImportFile(file){
    if(!file) return;
    state.importing = true;
    state.importError = "";
    render();

    fileToBase64(file).then(function(base64){
      var mediaType = file.type || "image/jpeg";
      var prompt = "これはラリー競技のアイテナリー（行程表）の画像です。次のJSONオブジェクトだけを出力してください。説明文やコードフェンスは一切含めないでください。\n\n" +
        '{"title":"表の上部などに書かれている大会名(見つからなければ空文字)","rows":[{"tc":"TC番号やSS番号など","location":"地点名","ss":SS区間距離のkm数値またはnull,"li":リエゾン距離のkm数値またはnull,"section":"前半後半など区分の名前。区分が無い行(スタート/サービス等)は\\"-\\"","due":"到着予定時刻や参考時刻(文字列、無ければ空文字)"}]}\n\n' +
        "数値はkm単位の数値のみ(単位や括弧は除く)。読み取れない/存在しない値はnullにしてください。";

      return fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 4096,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
              { type: "text", text: prompt }
            ]
          }]
        })
      });
    }).then(function(response){
      return response.json();
    }).then(function(data){
      if(data.error) throw new Error(data.error.message || "API error");

      var text = (data.content || []).map(function(b){ return b.type === "text" ? b.text : ""; }).filter(Boolean).join("\n");
      var start = text.indexOf("{");
      var end = text.lastIndexOf("}");
      if(start === -1 || end === -1 || end < start) throw new Error("no JSON object found in response");

      var parsed = JSON.parse(text.slice(start, end + 1));
      var parsedRows = Array.isArray(parsed) ? parsed : parsed.rows;
      if(!Array.isArray(parsedRows) || parsedRows.length === 0) throw new Error("empty");

      var newRows = parsedRows.map(function(row){
        return {
          id: newId(),
          tc: row.tc == null ? "" : row.tc,
          location: row.location == null ? "" : row.location,
          ss: (row.ss === undefined || row.ss === null) ? null : Number(row.ss),
          li: (row.li === undefined || row.li === null) ? null : Number(row.li),
          section: (row.section && String(row.section).trim()) ? String(row.section).trim() : "-",
          due: row.due == null ? "" : row.due
        };
      });

      state.rows = newRows;
      state.sectionOverrides = {};
      if(!Array.isArray(parsed) && parsed.title && String(parsed.title).trim()){
        state.eventTitle = String(parsed.title).trim();
      }
      state.importing = false;
      state.importError = "";
      render();
    }).catch(function(err){
      console.error("Itinerary import failed:", err);
      state.importing = false;
      state.importError = "読み取りに失敗しました。画像がはっきり写っているか確認して再度お試しください。";
      render();
    });
  }

  // ---------- event delegation ----------
  var app = document.getElementById("app");

  app.addEventListener("input", function(e){
    if(!e.target || !e.target.dataset) return;
    if(e.target.dataset.field === "section") return; // handled on change, to avoid full rerender mid-typing
    if(e.target.dataset.action) return;
    applyFieldUpdate(e.target);
    recompute();
  });

  app.addEventListener("change", function(e){
    if(!e.target || !e.target.dataset) return;

    if(e.target.dataset.action === "import-camera" || e.target.dataset.action === "import-gallery"){
      var file = e.target.files && e.target.files[0];
      e.target.value = "";
      if(file) handleImportFile(file);
      return;
    }

    if(e.target.dataset.field === "section"){
      applyFieldUpdate(e.target);
      render();
    }
  });

  app.addEventListener("click", function(e){
    var btn = e.target.closest("[data-action]");
    if(!btn) return;
    var action = btn.dataset.action;

    if(action === "delete-row"){
      state.rows = state.rows.filter(function(r){ return r.id !== btn.dataset.rowId; });
      render();
    } else if(action === "add-row"){
      state.rows.push({ id:newId(), tc:"", location:"新規地点", ss:null, li:null, section:"-", due:"" });
      render();
    } else if(action === "reset"){
      resetState();
      render();
    } else if(action === "print"){
      window.print();
    } else if(action === "reset-override"){
      delete state.sectionOverrides[btn.dataset.sectionName];
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
